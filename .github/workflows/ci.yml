name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Rust canonical workspace. Build + clippy + test on all three OSes.
  # Two Windows-specific quirks live in .cargo/config.toml:
  #   - /EHsc for libduckdb-sys's C++ compile (warning C4530 → error)
  #   - Rstrtmgr.lib link arg for DuckDB's AdditionalLockInfo helper
  # Ubuntu needs a pre-build disk cleanup step (see below) because the
  # bundled DuckDB compile fills the runner's default 14 GB free space.
  rust:
    name: rust ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Ubuntu's ~14GB free disk isn't enough for a debug build of DuckDB's
      # bundled C++ amalgamation plus rustc debuginfo for the workspace.
      # Nuke the pre-installed .NET / Android / GHC / CodeQL junk to reclaim
      # ~25GB before the cargo cache + build land here.
      - name: Free disk space (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          docker system prune -af || true
          df -h

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --features stethoscope-store/bundled -- -D warnings
      - name: test
        run: cargo test --workspace --features stethoscope-store/bundled

  python:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install -e "packages/sdk-python[dev]"
      - name: ruff
        run: ruff check packages/sdk-python
      - name: pytest
        run: pytest packages/sdk-python -q

  cloud:
    name: cloud api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: |
          pip install -r cloud/requirements.txt
          pip install ruff pytest httpx
      - name: ruff
        run: ruff check cloud --line-length 100
      - name: pytest
        run: pytest cloud/tests tools/ref_ingest -q
        env:
          # Tests run against the DuckDB reference backend by default;
          # no AWS / Postgres needed.
          STETHOSCOPE_STORE: duckdb

  web:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
