name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Rust canonical workspace. As of v3.x the crates build + clippy + test
  # cleanly on Linux; CI now gates on them like any other job.
  #
  # Windows-only note: libduckdb-sys + MSVC + huge archives hit a
  # cc-rs/lib.exe race that's documented in docs/windows-build.md, plus the
  # CI runner doesn't have Norton getting in the way — so windows-latest in
  # this matrix is the canary for upstream regressions, not a developer
  # blocker. We keep it informational on Windows for now.
  rust:
    name: rust ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --features stethoscope-store/bundled -- -D warnings
      - name: test
        run: cargo test --workspace --features stethoscope-store/bundled

  python:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install -e "packages/sdk-python[dev]"
      - name: ruff
        run: ruff check packages/sdk-python
      - name: pytest
        run: pytest packages/sdk-python -q

  cloud:
    name: cloud api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: |
          pip install -r cloud/requirements.txt
          pip install ruff pytest httpx
      - name: ruff
        run: ruff check cloud --line-length 100
      - name: pytest
        run: pytest cloud/tests tools/ref_ingest -q
        env:
          # Tests run against the DuckDB reference backend by default;
          # no AWS / Postgres needed.
          STETHOSCOPE_STORE: duckdb

  web:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
