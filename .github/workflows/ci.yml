name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The Rust crates are the project's CANONICAL spec but have never been
  # compiled (built on a locked-down machine with no Rust toolchain — see
  # docs/windows-build.md). The verified, working path is the Python/TS
  # reference, gated by the `python sdk` + `lint (biome)` jobs below. This
  # job is informational (continue-on-error) until built in a Rust env;
  # it does not block the workflow / commit status.
  rust:
    name: rust canonical — informational, builds when a toolchain is available (${{ matrix.os }})
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace --features stethoscope-store/bundled

  python:
    name: python sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install -e "packages/sdk-python[dev]"
      - name: ruff
        run: ruff check packages/sdk-python
      - name: pytest
        run: pytest packages/sdk-python -q

  web:
    name: lint (biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm lint
