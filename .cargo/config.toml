# Workspace-wide cargo config.
#
# Why this file exists: libduckdb-sys (transitive dep of stethoscope-store
# when the `bundled` feature is on) needs two MSVC-specific workarounds.
#
# 1. The build script omits /EHsc, which causes the re2 sub-library and
#    several other translation units to fail to compile with warning C4530
#    being promoted to errors. cc-rs honours CXXFLAGS_<target> / CFLAGS_<target>
#    environment variables, target-scoped so they don't pollute Linux/macOS
#    builds where /EHsc would be invalid.
#
# 2. DuckDB's AdditionalLockInfo() helper on Windows uses the Restart Manager
#    API (RmStartSession, RmEndSession, RmRegisterResources, RmGetList) to
#    report which process holds a database file lock. The build script does
#    not pass Rstrtmgr.lib to link.exe, so any final binary linking
#    stethoscope-store fails with LNK2019 unresolved external symbols.
#    Adding Rstrtmgr.lib to rustflags here patches it at the workspace level.
#
# See docs/windows-build.md §DuckDB for the longer story.

[env]
CXXFLAGS_x86_64-pc-windows-msvc = "/EHsc"
CFLAGS_x86_64-pc-windows-msvc   = "/EHsc"
# i686 (32-bit) variant — same fix, just in case anyone builds 32-bit.
CXXFLAGS_i686-pc-windows-msvc   = "/EHsc"
CFLAGS_i686-pc-windows-msvc     = "/EHsc"

[target.x86_64-pc-windows-msvc]
rustflags = ["-Clink-arg=Rstrtmgr.lib"]

[target.i686-pc-windows-msvc]
rustflags = ["-Clink-arg=Rstrtmgr.lib"]
